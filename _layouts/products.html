---
layout: default
---

<div class="container">
    <h1>{{ page.title }}</h1>
    
    <div class="products-grid">
        {% for product in site.data.products %}
        <div class="product-card">
            <img src="{{ product.image }}" alt="{{ product.name }}">
            <h2>{{ product.name }}</h2>
            <p>{{ product.description }}</p>
        </div>
        {% endfor %}
    </div>
</div>

<style>
.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.product-card {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 15px;
    background: #f9f9f9;
}

.product-card img {
    max-width: 100%;
    height: auto;
    border-radius: 5px;
}
</style>
